version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: vlagalabs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vlagalabs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vlagalabs_password}
      POSTGRES_DB: ${POSTGRES_DB:-vlagalabs}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vlagalabs}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js Application with Payload CMS
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vlagalabs-app
    restart: unless-stopped
    environment:
      # Database connection
      DATABASE_URL: postgresql://${POSTGRES_USER:-vlagalabs}:${POSTGRES_PASSWORD:-vlagalabs_password}@postgres:5432/${POSTGRES_DB:-vlagalabs}
      
      # Payload CMS
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:-your-super-secret-key-change-in-production}
      
      # Next.js
      NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:-http://localhost:3000}
      NODE_ENV: production
    ports:
      - "3000:3000"
    volumes:
      # Persist uploaded media files
      - media_uploads:/app/media
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        echo 'Waiting for database to be ready...' &&
        sleep 5 &&
        echo 'Running Prisma migrations...' &&
        npx prisma migrate deploy &&
        echo 'Running Payload migrations...' &&
        npm run payload migrate &&
        echo 'Starting application...' &&
        npm start
      "

volumes:
  postgres_data:
    driver: local
  media_uploads:
    driver: local
